version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: devtrack_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: devtrack
      POSTGRES_PASSWORD: devtrack_secret
      POSTGRES_DB: devtrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devtrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devtrack_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://devtrack:devtrack_secret@db:5432/devtrack
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: super_secret_nextauth_key_change_in_production
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
